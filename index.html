<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis imágenes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 20px; color: #222; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .card-body { padding: 10px; }
    .card-body p { font-size: 11px; color: #555; word-break: break-all; margin-bottom: 8px; }
    .btn { width: 100%; padding: 6px; background: #0051c3; color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .btn:hover { background: #003fa0; }
    .btn.copied { background: #16a34a; }
  </style>
</head>
<body>
  <h1>🖼️ Mis imágenes — copia el link y úsalo en tu web</h1>
  <div class="grid" id="gallery"></div>

  <script>
    const BASE = window.location.origin + '/';
    const images = [
      '21122.webp','214214.webp','1245656.webp','11245543.webp','75648765.webp','KC1149_2.webp','KC240265-3.webp',
      'KC245215-6-COLORS-FACE-PALETTE.webp','KC246212_10.webp','kevin-_-coco-cosmetic-set-3.webp','powerpuff-girls-paleta-de-sombras-1.webp',
      'RUBORES_EN_BARRA.webp','yerimua-unique-setting-spray-4800282.webp','11.jpeg','1.jpg','515b75a69ec1aedb14bda99d0459a8cd.jpg_720x720q80.jpg',
      'IMG-20260424-WA0000.jpg','IMG-20260424-WA0001.jpg','IMG-20260424-WA0002.jpg','IMG-20260424-WA0003.jpg','IMG-20260424-WA0005.jpg',
      'IMG-20260424-WA0008.jpg','IMG-20260424-WA0010.jpg','IMG-20260424-WA0012.jpg','IMG-20260424-WA0015.jpg','IMG-20260424-WA0017.jpg',
      'IMG-20260424-WA0018.jpg','IMG-20260424-WA0019.jpg','IMG-20260424-WA0020.jpg','IMG-20260424-WA0021.jpg','IMG-20260424-WA0022.jpg',
      'IMG-20260424-WA0023.jpg','IMG-20260424-WA0024.jpg','IMG-20260424-WA0025.jpg','IMG-20260424-WA0026.jpg','IMG-20260424-WA0027.jpg',
      'IMG-20260424-WA0030.jpg','pr09978.jpg','IMG-20260423-WA0044.png','IMG-20260423-WA0046.png','IMG-20260423-WA0048 (1).png',
      'IMG-20260423-WA0050.png','IMG-20260423-WA0051.png','IMG-20260424-WA0028.png','IMG-20260424-WA0032.png','2.webp','6.webp','7.webp','10.webp','12.webp'
    ];


    const gallery = document.getElementById('gallery');

    images.forEach(name => {
      const url = BASE + name;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${url}" alt="${name}" loading="lazy" onerror="this.style.background='#eee';this.style.height='160px'">
        <div class="card-body">
          <p>${name}</p>
          <button class="btn" onclick="copyLink('${url}', this)">Copiar link</button>
        </div>
      `;
      gallery.appendChild(card);
    });

    function copyLink(url, btn) {
      navigator.clipboard.writeText(url);
      btn.textContent = '✓ Copiado';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copiar link'; btn.classList.remove('copied'); }, 2000);
    }
  </script>
</body>
</html>
